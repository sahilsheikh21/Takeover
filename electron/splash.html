<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Takeover - Starting</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: transparent;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      -webkit-app-region: drag;
      overflow: hidden;
    }

    .shell {
      position: relative;
      width: min(456px, calc(100vw - 20px));
      height: 296px;
      border-radius: 22px;
      border: 6px solid #98a2b0;
      background:
        radial-gradient(circle at 50% 38%, rgba(38, 66, 96, 0.2), rgba(8, 12, 16, 0) 40%),
        linear-gradient(90deg, #03060a 0%, #090c11 38%, #0a0f14 61%, #04080d 100%);
      box-shadow:
        0 20px 36px rgba(0, 0, 0, 0.45),
        inset 0 0 0 1px rgba(255, 255, 255, 0.03);
      overflow: hidden;
    }

    .shell::before {
      content: '';
      position: absolute;
      inset: 0;
      background:
        linear-gradient(90deg,
          rgba(0, 0, 0, 0.36) 0 29%,
          rgba(255, 255, 255, 0.03) 29% 31%,
          rgba(0, 0, 0, 0.24) 31% 69%,
          rgba(255, 255, 255, 0.03) 69% 71%,
          rgba(0, 0, 0, 0.36) 71% 100%
        );
      pointer-events: none;
    }

    .center {
      position: absolute;
      inset: 0 0 56px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 10px;
    }

    .logo-frame {
      width: 70px;
      height: 70px;
      border-radius: 14px;
      border: 1px solid rgba(167, 206, 255, 0.45);
      background: linear-gradient(145deg, rgba(2, 8, 14, 0.94), rgba(1, 3, 6, 0.98));
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 0 30px rgba(52, 146, 255, 0.2);
      overflow: hidden;
    }

    .logo-frame img {
      width: 62px;
      height: 62px;
      object-fit: contain;
      filter: drop-shadow(0 0 8px rgba(36, 143, 255, 0.35));
    }

    .title {
      margin-top: 8px;
      font-size: 42px;
      line-height: 1;
      font-weight: 700;
      letter-spacing: -1px;
      color: #e9edf4;
    }

    .subtitle {
      font-size: 11px;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: rgba(166, 185, 210, 0.82);
    }

    .progress-wrap {
      margin-top: 18px;
      width: 164px;
    }

    .loader-track {
      width: 100%;
      height: 2px;
      background: rgba(155, 172, 194, 0.32);
      border-radius: 2px;
      overflow: hidden;
    }

    .loader-bar {
      width: 62%;
      height: 100%;
      background: linear-gradient(90deg, #0f87ff, #56b7ff);
      border-radius: 2px;
      animation: progressPulse 2.6s ease-in-out infinite;
    }

    .progress-meta {
      margin-top: 10px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
    }

    #status {
      font-size: 7px;
      letter-spacing: 1px;
      text-transform: uppercase;
      color: rgba(144, 168, 197, 0.78);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      max-width: 120px;
      transition: color 0.3s;
    }

    .percent {
      font-size: 7px;
      letter-spacing: 0.8px;
      color: rgba(188, 205, 227, 0.72);
      text-transform: uppercase;
    }

    .footer {
      position: absolute;
      left: 0;
      right: 0;
      bottom: 0;
      height: 56px;
      background: #e8ebee;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      color: #8a95a4;
      font-size: 10px;
    }

    .status-icon {
      width: 18px;
      height: 12px;
      border-radius: 8px;
      border: 1px solid rgba(0, 0, 0, 0.18);
      background: #dde5ee;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 2px;
    }

    .status-icon span {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: linear-gradient(180deg, #2a8cff, #1357c2);
      border: 1px solid rgba(13, 72, 153, 0.65);
    }

    .copyright {
      position: absolute;
      left: 50%;
      bottom: 6px;
      transform: translateX(-50%);
      font-size: 6px;
      letter-spacing: 0.5px;
      color: rgba(102, 114, 130, 0.85);
    }

    @keyframes progressPulse {
      0%, 100% { width: 38%; opacity: 0.7; }
      50% { width: 74%; opacity: 1; }
    }
  </style>
</head>
<body>
  <div class="shell">
    <div class="center">
      <div class="logo-frame"><img src="./icons/icon.png" alt="Takeover logo"></div>
      <h1 class="title">Takeover</h1>
      <p class="subtitle">Your Local AI Desktop Agent</p>

      <div class="progress-wrap">
        <div class="loader-track">
          <div class="loader-bar"></div>
        </div>
        <div class="progress-meta">
          <div id="status">Initializing neural core</div>
          <div class="percent">65%</div>
        </div>
      </div>
    </div>

    <div class="footer">
      <div class="status-icon">
        <span></span>
        <span></span>
      </div>
      <span>Ready for</span>
      <span>local execution.</span>
    </div>

    <div class="copyright">© 2024 ATMOSPHERIC PRECISION TOOLS</div>
  </div>
</body>
</html>
